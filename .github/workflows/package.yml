name: Package etui Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g., v0.1.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # don't cancel the other OS legs if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            out_name: etui-linux
          - os: macos-latest
            out_name: etui-macos
          - os: windows-latest
            out_name: etui-windows.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up PDM
      uses: pdm-project/setup-pdm@v4
      with:
        python-version: '3.13'
        cache: true

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev

    - name: Install Project Dependencies
      run: |
        # --group default-tabs installs the first-party tab plugins so etui.spec
        # can bundle them; without it the release binary ships core-only.
        pdm install --frozen-lockfile --group default-tabs

    - name: Run PyInstaller
      run: |
        pdm run pyinstaller etui.spec

    - name: Rename Output Binary
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/etui.exe dist/${{ matrix.out_name }}
        else
          mv dist/etui dist/${{ matrix.out_name }}
        fi

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: etui-${{ matrix.os }}
        path: dist/${{ matrix.out_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="${{ github.event.inputs.version }}"
        if [ -z "$TAG_NAME" ]; then
          TAG_NAME="${{ github.ref_name }}"
        fi
        gh release create "$TAG_NAME" \
          artifacts/etui-ubuntu-latest/etui-linux \
          artifacts/etui-macos-latest/etui-macos \
          artifacts/etui-windows-latest/etui-windows.exe \
          --title "Release $TAG_NAME" \
          --generate-notes
