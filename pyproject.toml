[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "etui"
version = "0.2.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13,<3.15"
dependencies = [
    "textual>=8.1.1",
    "pyocd>=0.44.1",
    "pyserial>=3.5",
    "pygments>=2.17.0",
    "xonsh>=0.18.3",
    "packaging>=22.0",
    "pyyaml>=6.0.3",
]

[project.scripts]
etui = "etui.main:main"

[tool.pdm.build]
includes = ["etui/"]

[dependency-groups]
dev = [
    "textual-dev>=1.8.0",
    "pyinstaller>=6.10",
    "pytest>=9.0.3",
]
