[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "etui"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "textual>=8.1.1",
    "pyocd>=0.44.1",
    "pyserial>=3.5",
    "pygments>=2.17.0",
    "xonsh>=0.18.3"
]

[project.scripts]
etui = "etui.main:main"
[dependency-groups]
dev = [
    "textual-dev>=1.8.0",
    "pyinstaller>=4.5.1",
]
